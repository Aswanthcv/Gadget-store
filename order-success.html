<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Success</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <nav>
    <a href="index.html" class="logo" aria-label="GadgetHub home">
      <span class="logo-pill">
        <span class="logo-gadget">Gadget</span><span class="logo-hub">HUB</span>
      </span>
    </a>
    <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
      <i class="fa-solid fa-bars"></i>
    </button>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="index.html#product-list">Products</a></li>
      <li>
        <a href="cart.html">
          <i class="fa-solid fa-bag-shopping"></i>
          (<span id="cart-count">0</span>)
        </a>
      </li>
      <li class="auth-link-item">
        <a href="login.html"><i class="fa-solid fa-arrow-right-to-bracket"></i> Login / Signup</a>
      </li>
      <li><a href="#" onclick="logout()">Logout</a></li>
    </ul>
  </nav>

  <div class="success-container">
    <div class="success-box">
      
      <i class="fas fa-check-circle success-icon"></i>

      <h2>Order Placed Successfully!</h2>
      <p>Your order has been confirmed.</p>

      <a href="index.html" class="cta-btn">Continue Shopping</a>

    </div>
  </div>

  <footer class="footer">
    <div class="footer-content">

      <h3>Gadget Store</h3>
      <p>Your trusted place for latest tech products.</p>
      <p class="contact"> <i class="fas fa-phone"></i>+91 98765 43210</p>

      <div class="social-icons">
        <a href="#"><i class="fab fa-facebook-f"></i></a>
        <a href="#"><i class="fab fa-instagram"></i></a>
        <a href="#"><i class="fab fa-twitter"></i></a>
      </div>

    </div>

    <div class="footer-bottom">
      <p>© 2026 Gadget Store. All rights reserved.</p>
    </div>
  </footer>  

  <script>
    let isLoggedIn = localStorage.getItem("isLoggedIn") === "true";
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    let count = cart.reduce((sum, item) => sum + item.quantity, 0);
    let countEl = document.getElementById("cart-count");

    if (countEl) {
      countEl.innerText = count;
    }

    let navLinks = document.querySelectorAll("nav ul li a");
    let loginLink = null;
    let logoutLink = null;

    navLinks.forEach(link => {
      if (link.textContent.trim() === "Login / Signup") {
        loginLink = link;
      }

      if (link.textContent.trim() === "Logout") {
        logoutLink = link;
      }
    });

    if (loginLink) {
      loginLink.style.display = isLoggedIn ? "none" : "inline-block";
    }

    if (logoutLink) {
      logoutLink.style.display = isLoggedIn ? "inline-block" : "none";
    }

    function logout() {
      localStorage.removeItem("isLoggedIn");
      localStorage.removeItem("currentUser");
      localStorage.removeItem("cart");
      window.location.href = "login.html";
    }

    function initMobileNav() {
      let nav = document.querySelector("nav");
      let navToggle = document.querySelector(".nav-toggle");
      let navLinks = document.querySelectorAll("nav ul li a");

      if (!nav || !navToggle) {
        return;
      }

      navToggle.addEventListener("click", () => {
        nav.classList.toggle("nav-open");
        let isExpanded = nav.classList.contains("nav-open");
        navToggle.setAttribute("aria-expanded", isExpanded ? "true" : "false");
      });

      navLinks.forEach(link => {
        link.addEventListener("click", () => {
          nav.classList.remove("nav-open");
          navToggle.setAttribute("aria-expanded", "false");
        });
      });
    }

    initMobileNav();
  </script>

</body>
</html>
