<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gadget Store</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <!-- Navbar -->
  <nav>
    <a href="index.html" class="logo">
      <img src="images/logo.png" alt="Gadget Hub Logo">
    </a>
    <ul>
      <li><a href="index.html" class="active-link">Home</a></li>
      <li><a href="#product-list">Products</a></li>
      <li>
        <a href="cart.html">
          <i class="fa-solid fa-bag-shopping"></i>
          (<span id="cart-count">0</span>)
        </a>
      </li>
      <li><a href="#" onclick="logout()">Logout</a></li>
    </ul>
  </nav>
  
  <!-- Banner -->
    <section class="banner">
      <img src="images/banner-img.jpg" alt="Banner">

      <div class="overlay"></div>

      <div class="banner-text">
        <h1>Best sellers at <span class="banner-span">best price</span></h1>
        <p>Top smartphones at unbeatable prices</p>
        <a href="#product-list" class="cta-btn">Shop Now</a>
      </div>

      <div class="scroll-down"><i class="fa-solid fa-arrow-down"></i></div>
    </section>
  <!-- Products -->
   <h2 class="section-title">Our Products</h2>
  <section class="products" id="product-list">
    
  </section>

  <footer class="footer">
    <div class="footer-content">

      <h3>Gadget Store</h3>
      <p>Your trusted place for latest tech products.</p>
      <p class="contact"> <i class="fas fa-phone"></i>+91 98765 43210</p>

      <div class="social-icons">
        <a href="#"><i class="fab fa-facebook-f"></i></a>
        <a href="#"><i class="fab fa-instagram"></i></a>
        <a href="#"><i class="fab fa-twitter"></i></a>
      </div>

    </div>

    <div class="footer-bottom">
      <p>© 2026 Gadget Store. All rights reserved.</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
